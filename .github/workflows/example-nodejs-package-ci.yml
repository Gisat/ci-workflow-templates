name: CI - example-nodejs-package

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-example-nodejs-package-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: examples/nodejs-package/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: examples/nodejs-package

      - name: Run lint
        run: npm run lint
        working-directory: examples/nodejs-package

      - name: Run tests
        run: npm test
        working-directory: examples/nodejs-package

      - name: Build
        run: npm run build
        working-directory: examples/nodejs-package

      - name: Verify build output
        run: test -d dist && ls dist/
        working-directory: examples/nodejs-package
