name: Release - example-nodejs-app

on:
  push:
    branches:
      - main

concurrency:
  group: release-example-nodejs-app
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Configure git for SSH
        run: |
          git config --global url."git@github.com:".insteadOf "https://github.com/"
          git remote set-url origin "git@github.com:${{ github.repository }}.git"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: examples/nodejs-app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: examples/nodejs-app

      - name: Release
        id: release
        uses: cycjimmy/semantic-release-action@v6
        with:
          working_directory: examples/nodejs-app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: ${{ steps.release.outputs.new_release_published == 'true' }}
        uses: docker/setup-buildx-action@v4

      - name: Login to Container Registry
        if: ${{ steps.release.outputs.new_release_published == 'true' }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        if: ${{ steps.release.outputs.new_release_published == 'true' }}
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/ci-workflow-templates/example-nodejs-app
          tags: |
            type=semver,pattern={{version}},value=v${{ steps.release.outputs.new_release_version }},enable=${{ steps.release.outputs.new_release_version != '' }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ steps.release.outputs.new_release_version }},enable=${{ steps.release.outputs.new_release_version != '' }}

      - name: Build and push
        if: ${{ steps.release.outputs.new_release_published == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: examples/nodejs-app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
