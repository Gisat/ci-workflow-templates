name: Release - example-nodejs-app

# NOTE: This workflow uses workflow_dispatch for TESTING PURPOSES ONLY in this template.
# Production repositories should trigger on push to the default branch instead:
#   push:
#     branches:
#       - main
on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Configure git for SSH
        run: |
          git config --global url."git@github.com:".insteadOf "https://github.com/"
          git remote set-url origin "git@github.com:${{ github.repository }}.git"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # NOTE: This step is for TESTING PURPOSES ONLY in this template repository.
      # Production repositories should use push-based triggers with proper commit conventions.
      # DO NOT implement this pattern in production - it creates unnecessary commits.
      - name: Force release on manual trigger
        if: github.event_name == 'workflow_dispatch'
        run: |
          git commit --allow-empty -m "chore: trigger release!semantic-release:release"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: examples/nodejs-app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: examples/nodejs-app

      - name: Release
        id: release
        uses: cycjimmy/semantic-release-action@v6
        with:
          working_directory: examples/nodejs-app
          extra_plugins: |
            @semantic-release/changelog@6.0.3
            @semantic-release/exec@7.1.0
            @semantic-release/git@10.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: ${{ steps.release.outputs.new_release_published == 'true' }}
        uses: docker/setup-buildx-action@v4

      - name: Login to Container Registry
        if: ${{ steps.release.outputs.new_release_published == 'true' }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: ${{ steps.release.outputs.new_release_published == 'true' }}
        run: |
          IMAGE_PREFIX=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          docker buildx build \
            --tag ghcr.io/${IMAGE_PREFIX}/ci-workflow-templates/example-nodejs-app:v${{ steps.release.outputs.new_release_version }} \
            --tag ghcr.io/${IMAGE_PREFIX}/ci-workflow-templates/example-nodejs-app:latest \
            --push \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            examples/nodejs-app
