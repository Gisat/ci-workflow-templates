name: CI - example-nodejs-app

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-example-nodejs-app-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: examples/nodejs-app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: examples/nodejs-app

      - name: Run lint
        run: npm run lint
        working-directory: examples/nodejs-app

      - name: Run tests
        run: npm test
        working-directory: examples/nodejs-app

      - name: Build
        run: npm run build
        working-directory: examples/nodejs-app

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        run: |
          IMAGE_PREFIX=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          docker buildx build --cache-from type=gha --cache-to type=gha,mode=max \
            --tag ghcr.io/${IMAGE_PREFIX}/ci-workflow-templates/example-nodejs-app:latest --load \
            --metadata-file /tmp/metadata.json \
            examples/nodejs-app

      - name: Verify image
        run: |
          IMAGE_PREFIX=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          docker run --rm ghcr.io/${IMAGE_PREFIX}/ci-workflow-templates/example-nodejs-app:latest node --version
