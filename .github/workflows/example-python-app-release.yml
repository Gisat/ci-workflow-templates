name: Release - example-python-app

on:
  workflow_dispatch:
    inputs:
      skip_ci:
        description: 'Skip CI checks (for testing release)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Configure git for SSH
        run: |
          git config --global url."git@github.com:".insteadOf "https://github.com/"
          git remote set-url origin "git@github.com:${{ github.repository }}.git"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen
        working-directory: examples/python-app

      - name: Release
        id: release
        uses: cycjimmy/semantic-release-action@v6
        with:
          working_directory: examples/python-app
          extra_plugins: |
            @semantic-release/changelog@6.0.0
            @semantic-release/exec@7.0.0
            @semantic-release/git@10.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: ${{ steps.release.outputs.new_release_published == 'true' }}
        uses: docker/setup-buildx-action@v4

      - name: Login to Container Registry
        if: ${{ steps.release.outputs.new_release_published == 'true' }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: ${{ steps.release.outputs.new_release_published == 'true' }}
        run: |
          IMAGE_PREFIX=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          docker buildx build \
            --tag ghcr.io/${IMAGE_PREFIX}/ci-workflow-templates/example-python-app:v${{ steps.release.outputs.new_release_version }} \
            --tag ghcr.io/${IMAGE_PREFIX}/ci-workflow-templates/example-python-app:latest \
            --push \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            examples/python-app
